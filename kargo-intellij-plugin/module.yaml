product: jvm/lib

settings:
  kotlin:
    freeCompilerArgs:
      - "-Xjvm-default=all"

apply:
  - ../sources/common.module-template.yaml
  - ../sources/used-in-idea.module-template.yaml

dependencies:
  - ../sources/core
  - ../sources/core-intellij
  - ../sources/frontend-api
  - ../sources/frontend/dr
  - ../sources/frontend/schema
  - ../sources/dependency-resolution
  - ../sources/frontend/plain/yaml-psi
  - ../sources/amper-project-templates
  - ../sources/amper-problem-reporting

  - $libs.intellij.platform.core: exported
  - $libs.intellij.platform.coreImpl: exported
  - $libs.intellij.platform.ideCore: exported
  - $libs.intellij.platform.ide: exported
  - $libs.intellij.platform.ideImpl: exported
  - $libs.intellij.platform.ideObservable: exported
  - $libs.intellij.platform.util: exported
  - $libs.intellij.platform.utilEx: exported
  - $libs.intellij.platform.execution: exported
  - $libs.intellij.platform.executionImpl: exported
  - $libs.intellij.platform.externalSystem: exported
  - $libs.intellij.platform.externalSystemImpl: exported
  - $libs.intellij.platform.projectModel: exported
  - $libs.intellij.platform.lang: exported
  - $libs.intellij.platform.langCore: exported
  - $libs.intellij.platform.langImpl: exported
  - $libs.intellij.platform.coreUi: exported
